[project]
name = "proyecto-data-pipeline"
profile = "data-pipeline"
client = "claude-code"
bundle_dir = ".claude"
flow_type = "complex"
harness_cli_version = "0.4.0"
created_at = "2026-05-13T19:20:41+00:00"

[orchestration]
# manual: tras cada agente, espera confirmación humana antes de invocar el siguiente.
# auto: el orquestador encadena agentes automáticamente, parando solo en gates humanos.
mode = "manual"

[orchestration.preview]
# Cuando mode=auto, antes de invocar el siguiente agente muestra preview.
show = true
wait_seconds = 5

[domains]
active = ["software", "data", "docs"]
